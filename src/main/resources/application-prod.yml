spring:
  datasource:
    url: jdbc:mariadb://<PRODUCTION-HOST>:3306/vdt_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}  # Inject these from environment variables or secret vault

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # Usually turned off in production

  flyway:
    enabled: true
    locations: classpath:db/migration